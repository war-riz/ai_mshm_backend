# ─────────────────────────────────────────────────────────────────────────────
#  AI-MSHM – Local Development Stack
#  Usage:
#    docker compose up -d          # start all services
#    docker compose up -d postgres  # start only postgres
#    docker compose logs -f api    # follow Django logs
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── postgres ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ai_mshm_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ai_mshm
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d ai_mshm"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (Celery broker + Channels layer) ────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: ai_mshm_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Django API (ASGI via Daphne) ──────────────────────────────────────────
  api:
    build: .
    container_name: ai_mshm_api
    restart: unless-stopped
    command: daphne -b 0.0.0.0 -p 8000 config.asgi:application
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Worker ─────────────────────────────────────────────────────────
  celery_worker:
    build: .
    container_name: ai_mshm_celery
    restart: unless-stopped
    command: celery -A config worker -l info -Q default
    volumes:
      - .:/app
    env_file:
      - .env.docker
    depends_on:
      - redis
      - postgres

  # ── Celery Beat (periodic tasks) ──────────────────────────────────────────
  celery_beat:
    build: .
    container_name: ai_mshm_beat
    restart: unless-stopped
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    env_file:
      - .env.docker
    depends_on:
      - redis
      - postgres

volumes:
  postgres_data: